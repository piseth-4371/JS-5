<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body>
    <div class="bg-gray-800 max-w-sm w-full h-auto p-5 m-auto mt-40 rounded-lg shadow shadow-gray-500 text-white">
        <form>
            <div class="bg-gray-400 w-auto h-auto rounded-md shadow shadow-gray-500 " >
                <input type="text" class="text-white text-end w-full h-16 p-3 text-3xl font-bold" name="display">
            </div> 
            <div class="grid grid-cols-4 gap-5 place-items-center my-5 w-full auto-rows-fr ">
                <input type="button" class="styleBtn text-blue-400" value="AC" onclick="display.value = '' ">
                <input type="button" class="styleBtn text-blue-400" value="DE" onclick="display.value = display.value.toString().slice(0, -1)">
                <input type="button" class="styleBtn text-blue-400" value="." onclick="display.value += '.' ">
                <input type="button" class="styleBtn text-blue-400" value="/" onclick="display.value += '/'">
                <input type="button" class="styleBtn" value="7" onclick="display.value += '7'">
                <input type="button" class="styleBtn" value="8" onclick="display.value += '8'">
                <input type="button" class="styleBtn" value="9" onclick="display.value += '9'">
                <input type="button" class="styleBtn text-blue-400" value="*" onclick="display.value += '*'">
                <input type="button" class="styleBtn" value="4" onclick="display.value += '4'">
                <input type="button" class="styleBtn" value="5" onclick="display.value += '5'">
                <input type="button" class="styleBtn" value="6" onclick="display.value += '6'">
                <input type="button" class="styleBtn text-blue-400" value="-" onclick="display.value += '-'">
                <input type="button" class="styleBtn" value="1" onclick="display.value += '1'">
                <input type="button" class="styleBtn" value="2" onclick="display.value += '2'">
                <input type="button" class="styleBtn" value="3" onclick="display.value += '3'">
                <input type="button" class="styleBtn text-blue-400" value="+" onclick="display.value += '+'">
                <input type="button" class="styleBtn" value="00" onclick="display.value += '00'">
                <input type="button" class="styleBtn" value="0" onclick="display.value += '0'">
                <input type="button" class="styleBtn col-span-2 text-blue-400" value="=" onclick="display.value = eval(display.value)">
            </div>
        </form>
    </div>
</body>
</html>
